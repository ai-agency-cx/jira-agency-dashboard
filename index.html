<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Jira Agency Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, sans-serif; background: #f8fafc; padding: 40px; text-align: center; }
        h1 { color: #1e293b; font-size: 2.5rem; margin-bottom: 10px; }
        .subtitle { color: #64748b; font-size: 1.1rem; margin-bottom: 30px; }
        .links { margin-top: 40px; }
        .btn { 
            display: inline-block; 
            padding: 14px 28px; 
            margin: 10px; 
            background: linear-gradient(135deg, #0ea5e9 0%, #8b5cf6 100%); 
            color: white; 
            text-decoration: none; 
            border-radius: 8px;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 25px rgba(14, 165, 233, 0.3);
        }
        .status { 
            margin-top: 30px; 
            padding: 15px; 
            background: #f0f9ff; 
            border-radius: 8px;
            display: inline-block;
            color: #0369a1;
        }
        .live-badge {
            background: #10b981;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <h1>🚀 Jira Agency Dashboard <span class="live-badge">LIVE</span></h1>
    <p class="subtitle">Project management dashboard for AI agency workflow</p>
    
    <div class="links">
        <a href="projects-dashboard.html" class="btn">📊 Projects Dashboard</a>
        <a href="projects/infralyze-kanban.html" class="btn">📋 Infralyze Kanban</a>
        <a href="project-template/kanban-template.html" class="btn">🎨 Kanban Template</a>
    </div>
    
    <div class="status">
        <strong>✅ Deployed:</strong> 2026-02-28 | 
        <strong>🔗 Repo:</strong> <a href="https://github.com/ai-agency-cx/jira-agency-dashboard" style="color: #0ea5e9;">ai-agency-cx/jira-agency-dashboard</a>
    </div>
    
    <div style="margin-top: 50px; color: #94a3b8; font-size: 0.9rem;">
        <p>Features: Drag & drop Kanban • CEO Review lane • Auto-save • Multi-project support</p>
    </div>
</body>
</html>
